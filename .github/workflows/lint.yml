name: Lint and Test

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      - name: flake8 Lint
        uses: py-actions/flake8@v2

  test:
    runs-on: ubuntu-latest
    name: Test Red-DiscordBot Installation
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Red-DiscordBot
        run: |
          pip install Red-DiscordBot
      - name: Install common cog dependencies
        run: |
          pip install cinemagoer==2022.12.27 httpx discord.py python-a2s>=1.3.0 Pillow>=10.2.0 yt-dlp>=2023.1.1
      - name: Test cog imports
        run: |
          python -c "from redbot.core import commands; print('✓ Red-DiscordBot core imports working')"
      - name: Run comprehensive test suite
        run: |
          python test_redbot_setup.py

  pytest:
    runs-on: ubuntu-latest
    name: Run Unit Tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install test dependencies
        run: |
          pip install -r requirements-test.txt
      - name: Run pytest tests
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
